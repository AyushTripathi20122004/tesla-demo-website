<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <!-- font awsome cdn -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

     <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=pause" />
    <!-- link css main file -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="tesla_signIn.css">
    
</head>
<body>
    <div class="container_window">
    <!-- navbar -->
    <div class="navbar">
            <div class="logo"><svg class="tds-icon tds-icon-logo-wordmark tds-site-logo-icon" viewBox="0 0 342 35" xmlns="http://www.w3.org/2000/svg"><path fill="currentColor" d="M0 .1a9.7 9.7 0 0 0 7 7h11l.5.1v27.6h6.8V7.3L26 7h11a9.8 9.8 0 0 0 7-7H0zm238.6 0h-6.8v34.8H263a9.7 9.7 0 0 0 6-6.8h-30.3V0zm-52.3 6.8c3.6-1 6.6-3.8 7.4-6.9l-38.1.1v20.6h31.1v7.2h-24.4a13.6 13.6 0 0 0-8.7 7h39.9v-21h-31.2v-7zm116.2 28h6.7v-14h24.6v14h6.7v-21h-38zM85.3 7h26a9.6 9.6 0 0 0 7.1-7H78.3a9.6 9.6 0 0 0 7 7m0 13.8h26a9.6 9.6 0 0 0 7.1-7H78.3a9.6 9.6 0 0 0 7 7m0 14.1h26a9.6 9.6 0 0 0 7.1-7H78.3a9.6 9.6 0 0 0 7 7M308.5 7h26a9.6 9.6 0 0 0 7-7h-40a9.6 9.6 0 0 0 7 7"></path></svg></div>
            <div class="menu_section"><button onclick="open_menu_section()">Menu</button>
            </div>
    </div>
    <div class="sign_in_base">
        <div class="sign_in_card">
            <div class="sign_in_heading">
                  <h1>Sign In</h1>
            </div>
            <div class="email_container">
                <label for="">Email</label>
                <input type="email">
            </div>
            <div class="button_container">
                <button>
                    Next
                </button>
            </div>
            <div class="truble_signin">
                <a href="">Trouble signing in ?</a>
            </div>
            <div class="alternate_container">
                <span class="devider">or</span>
            </div>
            <div class="crate_account">
                <button onclick="createAccount()">
                    Create Account
                </button>
            </div>

        </div>


    </div>
      <!-- -------footer  start here links------ -->
    <footer class="footer">
        <div class="links_base">
            <a href="" class="links">Tesla © 2025</a>
            <a href="" class="links">Privacy & Legal</a>
            <a href="" class="links">Contact</a>
        </div>
    </footer>
    </div>
    <script src="tesla_signIn.js"></script>
    </body>
</html>
